name: lifescale

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifescale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifescale}
      POSTGRES_USER: ${POSTGRES_USER:-lifescale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifescale_local_password}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - lifescale-postgres-data:/var/lib/postgresql/data
    networks:
      - lifescale-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lifescale-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - lifescale-redis-data:/data
    networks:
      - lifescale-network
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lifescale-network:
    name: lifescale-network

volumes:
  lifescale-postgres-data:
    name: lifescale-postgres-data
  lifescale-redis-data:
    name: lifescale-redis-data
