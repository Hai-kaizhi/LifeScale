# ============================================================================
# LifeScale staging 编排（上线前联调验收环境）
# ----------------------------------------------------------------------------
# 用途：在腾讯云服务器上提供与 prod 隔离的 staging 环境，用于上线前验收。
#
# 与 docker-compose.full.yml（prod）的关键差异（实现 staging/prod 隔离）：
#   1. compose project name：lifescale-staging（prod 是 lifescale）
#   2. 容器名：全部加 -staging 后缀（lifescale-staging-pg / -redis / -backend）
#   3. 数据卷：全部加 -staging 后缀（与 prod 物理隔离）
#   4. 端口：backend 暴露 ${STAGING_BACKEND_PORT:-8081}（prod 用 8080）
#   5. 网络：lifescale-staging-net（独立 bridge 网络）
#   6. nginx：不启动（staging 验收用 IP:8081 直连，不占 80/443）
#
# 隔离原则：staging 和 prod 必须在不同目录（/opt/LifeScale-staging vs /opt/LifeScale），
#           各自独立 compose project，互不干扰。
#
# 用法（服务器上）：
#   cd /opt/LifeScale-staging/code/docker
#   cp .env.staging.example .env && vim .env    # 填 staging 独立密钥
#   set -a && source .env && set +a
#   docker compose -f docker-compose.staging.yml up -d --build
#
# 验证：
#   curl http://localhost:8081/api/health        # 服务器本机
#   curl http://YOUR_SERVER_IP:8081/api/health     # 外网（需放行 8081 安全组）
# ============================================================================

name: lifescale-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifescale-staging-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifescale}
      POSTGRES_USER: ${POSTGRES_USER:-lifescale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 设置}
    volumes:
      - lifescale-staging-postgres-data:/var/lib/postgresql/data
    networks:
      - lifescale-staging-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifescale} -d ${POSTGRES_DB:-lifescale}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lifescale-staging-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD 必须在 .env 设置}", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - lifescale-staging-redis-data:/data
    networks:
      - lifescale-staging-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: lifescale/backend:staging
    container_name: lifescale-staging-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 数据库（容器内网络）
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lifescale}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lifescale}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis（容器内网络）
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT（staging 独立强随机，与 prod 不同）
      LIFESCALE_JWT_SECRET: ${LIFESCALE_JWT_SECRET:?LIFESCALE_JWT_SECRET 必须在 .env 设置}
      LIFESCALE_JWT_TTL_HOURS: ${LIFESCALE_JWT_TTL_HOURS:-24}
      # Bootstrap 管理员（staging 独立账号）
      LIFESCALE_BOOTSTRAP_USERNAME: ${LIFESCALE_BOOTSTRAP_USERNAME:-admin}
      LIFESCALE_BOOTSTRAP_PASSWORD: ${LIFESCALE_BOOTSTRAP_PASSWORD:?LIFESCALE_BOOTSTRAP_PASSWORD 必须在 .env 设置}
      # 邀请码（staging 可关闭方便测试）
      LIFESCALE_INVITE_CODE_ENABLED: ${LIFESCALE_INVITE_CODE_ENABLED:-false}
      LIFESCALE_INVITE_CODE_TTL_DAYS: ${LIFESCALE_INVITE_CODE_TTL_DAYS:-7}
      # 限流
      LIFESCALE_RATE_LIMIT_ENABLED: ${LIFESCALE_RATE_LIMIT_ENABLED:-true}
      # CAS 正文存储
      LIFESCALE_CAS_ROOT: /app/data/cas
      LIFESCALE_SERVER_MD_ROOT: ${LIFESCALE_SERVER_MD_ROOT:-}
      # 腾讯云 COS（staging 用独立 prefix，避免污染 prod 附件）
      LIFESCALE_COS_SECRET_ID: ${LIFESCALE_COS_SECRET_ID:-}
      LIFESCALE_COS_SECRET_KEY: ${LIFESCALE_COS_SECRET_KEY:-}
      LIFESCALE_COS_REGION: ${LIFESCALE_COS_REGION:-ap-guangzhou}
      LIFESCALE_COS_BUCKET: ${LIFESCALE_COS_BUCKET:-}
      LIFESCALE_COS_CDN_DOMAIN: ${LIFESCALE_COS_CDN_DOMAIN:-}
      LIFESCALE_COS_PREFIX: ${LIFESCALE_COS_PREFIX:-staging/att}
      TZ: Asia/Shanghai
    volumes:
      - lifescale-staging-cas-data:/app/data/cas
      - lifescale-staging-backend-logs:/app/logs
    ports:
      # staging 独立端口（默认 8081，避开 prod 的 8080）
      - "${STAGING_BIND_HOST:-0.0.0.0}:${STAGING_BACKEND_PORT:-8081}:8080"
    networks:
      - lifescale-staging-net

networks:
  lifescale-staging-net:
    name: lifescale-staging-net
    driver: bridge

volumes:
  lifescale-staging-postgres-data:
    name: lifescale-staging-postgres-data
  lifescale-staging-redis-data:
    name: lifescale-staging-redis-data
  lifescale-staging-cas-data:
    name: lifescale-staging-cas-data
  lifescale-staging-backend-logs:
    name: lifescale-staging-backend-logs
