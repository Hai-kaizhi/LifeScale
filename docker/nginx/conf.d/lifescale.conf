# ============================================================================
# LifeScale 生产环境 nginx 配置（HTTPS）
# ----------------------------------------------------------------------------
# 这是【模板】。部署前必须：
#   1. 把所有 YOUR_DOMAIN.com 替换为你的真实域名
#   2. 把 SSL 证书文件放到 ../certs/ 目录（fullchain.pem + privkey.pem）
#      证书申请方法见 ../DEPLOY.md（推荐宝塔面板一键申请 Let's Encrypt）
#
# 流量：客户端 → :80(跳转HTTPS) / :443(HTTPS主入口) → backend:8080
# ============================================================================

# ---- 限流区定义（放 http 块；nginx-alpine 默认在 nginx.conf 引入 conf.d/*.conf 进 http 块）----
limit_req_zone $binary_remote_addr zone=lifescale_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=lifescale_auth:10m rate=5r/s;

# ---- 上游：后端 Spring Boot（容器网络名 = 服务名）----
upstream lifescale_backend {
    server backend:8080;
    keepalive 32;
}

# ============================================================================
# HTTP（80）：仅做 301 跳转到 HTTPS + ACME 证书验证路径（备用）
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com;

    # Let's Encrypt webroot 验证（如用 certbot 申请证书时需要；宝塔申请可忽略）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS（443）：主服务入口
# ============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN.com;

    # ---- SSL 证书（宝塔申请后放到 ../certs/，见 DEPLOY.md）----
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ---- SSL 安全配置 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ---- 安全响应头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP（按需收紧；下面允许 self + 腾讯云 COS 域名用于附件）
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.myqcloud.com; connect-src 'self' https://*.cos.ap-guangzhou.myqcloud.com" always;

    # ---- gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ---- 客户端上传体积（附件上传；按需调整，默认 20MB）----
    client_max_body_size 20m;

    # ---- 健康检查（不记 access_log，避免日志噪音）----
    location = /api/health {
        proxy_pass http://lifescale_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ---- 鉴权类接口（更严格的限流：5 r/s）----
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=lifescale_auth burst=10 nodelay;
        proxy_pass http://lifescale_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- API 主反代（10 r/s 限流 + 突发 20）----
    location /api/ {
        limit_req zone=lifescale_api burst=20 nodelay;
        proxy_pass http://lifescale_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 连接超时（后端同步/合并可能耗时，给宽松些）
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 上游 keepalive（配合 upstream 的 keepalive 32）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- Swagger UI / OpenAPI（生产可考虑关闭或加 IP 白名单/basic auth）----
    # 如要关闭生产 Swagger，注释掉下面两个 location 即可
    location /swagger-ui/ {
        proxy_pass http://lifescale_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v3/api-docs {
        proxy_pass http://lifescale_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 根路径（可选：返回简单欢迎页或 404；LifeScale 是纯 API 后端，无 Web 前端）----
    location = / {
        return 200 'LifeScale API is running. See /api/health\n';
        add_header Content-Type text/plain;
    }

    # ---- 其余路径返回 404 ----
    location / {
        return 404;
    }
}
