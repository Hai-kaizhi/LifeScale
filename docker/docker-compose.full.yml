# ============================================================================
# LifeScale 全栈编排（后端 + PostgreSQL + Redis）
# ----------------------------------------------------------------------------
# 用途：里程碑1「本地 Docker 跑通」+ 生产部署。把后端也容器化，模拟/等同于生产环境。
#
# 与 docker-compose.yml（仅 PG/Redis 开发依赖）的区别：
#   - 本文件加上 backend 服务，SPRING_PROFILES_ACTIVE=prod，全容器化
#   - PG/Redis 不暴露端口（仅内部网络），backend 绑定 127.0.0.1:8080 待 Nginx 反代
#
# 用法：
#   本地验证：  docker compose -f docker-compose.full.yml --env-file .env.production.example up --build
#   生产部署：  docker compose -f docker-compose.full.yml --env-file .env up -d --build
#
# 环境变量来源（二选一）：
#   --env-file .env.production.example   本地验证（含示例值，仅测试用）
#   --env-file .env                       生产（强随机真实值，不提交）
# ============================================================================

name: lifescale

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifescale-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifescale}
      POSTGRES_USER: ${POSTGRES_USER:-lifescale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 设置}
    volumes:
      - lifescale-postgres-data:/var/lib/postgresql/data
    # 生产不暴露端口（仅内部网络）；本地验证如需直连调试，取消下行注释
    # ports:
    #   - "127.0.0.1:15432:5432"
    networks:
      - lifescale-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifescale} -d ${POSTGRES_DB:-lifescale}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lifescale-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD 必须在 .env 设置}", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - lifescale-redis-data:/data
    networks:
      - lifescale-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: lifescale/backend:latest
    container_name: lifescale-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 数据库（容器内网络主机名 = 服务名）
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lifescale}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lifescale}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis（容器内网络）
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT（prod 无默认值，JwtService 会 fail-fast 校验强度）
      LIFESCALE_JWT_SECRET: ${LIFESCALE_JWT_SECRET:?LIFESCALE_JWT_SECRET 必须在 .env 设置}
      LIFESCALE_JWT_TTL_HOURS: ${LIFESCALE_JWT_TTL_HOURS:-24}
      # Bootstrap 管理员（prod 强制强密码，弱密码 fail-fast）
      LIFESCALE_BOOTSTRAP_USERNAME: ${LIFESCALE_BOOTSTRAP_USERNAME:-admin}
      LIFESCALE_BOOTSTRAP_PASSWORD: ${LIFESCALE_BOOTSTRAP_PASSWORD:?LIFESCALE_BOOTSTRAP_PASSWORD 必须在 .env 设置（≥8位含字母数字）}
      # 邀请码注册（prod 强制开启）
      LIFESCALE_INVITE_CODE_ENABLED: ${LIFESCALE_INVITE_CODE_ENABLED:-true}
      LIFESCALE_INVITE_CODE_TTL_DAYS: ${LIFESCALE_INVITE_CODE_TTL_DAYS:-7}
      # 限流（prod 强制开启）
      LIFESCALE_RATE_LIMIT_ENABLED: ${LIFESCALE_RATE_LIMIT_ENABLED:-true}
      # CAS 正文存储（Markdown 内容寻址，落容器卷）
      LIFESCALE_CAS_ROOT: /app/data/cas
      LIFESCALE_SERVER_MD_ROOT: ${LIFESCALE_SERVER_MD_ROOT:-}
      # 腾讯云 COS（附件；可留空则回退磁盘 CAS）
      LIFESCALE_COS_SECRET_ID: ${LIFESCALE_COS_SECRET_ID:-}
      LIFESCALE_COS_SECRET_KEY: ${LIFESCALE_COS_SECRET_KEY:-}
      LIFESCALE_COS_REGION: ${LIFESCALE_COS_REGION:-ap-guangzhou}
      LIFESCALE_COS_BUCKET: ${LIFESCALE_COS_BUCKET:-}
      LIFESCALE_COS_CDN_DOMAIN: ${LIFESCALE_COS_CDN_DOMAIN:-}
      LIFESCALE_COS_PREFIX: ${LIFESCALE_COS_PREFIX:-att}
      TZ: Asia/Shanghai
    volumes:
      - lifescale-cas-data:/app/data/cas          # CAS 正文持久化（Markdown 内容寻址）
      - lifescale-backend-logs:/app/logs          # 后端日志持久化
    ports:
      - "127.0.0.1:8080:8080"                     # 仅绑定 127.0.0.1，由 Nginx 反代；本机直连验证也可
    networks:
      - lifescale-net

  # ============================================================================
  # Nginx 反向代理（生产入口：HTTPS 终止 + 反代 backend）
  # ----------------------------------------------------------------------------
  # SSL 证书由宝塔面板申请（详见 nginx/DEPLOY.md），证书文件放在 ./nginx/certs/
  # （该目录已被 .gitignore 忽略，绝不入库）。
  # 流量：客户端 → nginx:80/443 → backend:8080（容器内网络）
  # ============================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: lifescale-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"                                       # HTTP（301 跳转到 HTTPS）
      - "443:443"                                     # HTTPS 主入口
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro           # nginx 配置（入库，模板）
      - ./nginx/certs:/etc/nginx/certs:ro             # SSL 证书（不入库，宝塔生成后放这）
      - ./nginx/logs:/var/log/nginx                   # nginx 访问/错误日志
    networks:
      - lifescale-net

networks:
  lifescale-net:
    name: lifescale-net
    driver: bridge

volumes:
  lifescale-postgres-data:
    name: lifescale-postgres-data-full
  lifescale-redis-data:
    name: lifescale-redis-data-full
  lifescale-cas-data:
    name: lifescale-cas-data
  lifescale-backend-logs:
    name: lifescale-backend-logs
