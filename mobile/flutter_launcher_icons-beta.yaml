# flutter_launcher_icons 配置 —— 测试版（beta flavor）
# 源图：assets/icons/brand/app_icon_source_1024_beta.png（白底蓝色笑脸 + 右上角红色 BETA 角标）
# 生成：dart run flutter_launcher_icons -f flutter_launcher_icons-beta.yaml
#
# 说明：beta 配置生成到 beta flavor 的源集目录 mipmap-*-beta/，
# 与正式版图标物理隔离，实现"同一台手机同时安装测试版和正式版、图标不同"。

flutter_launcher_icons:
  image_path: "assets/icons/brand/app_icon_source_1024_beta.png"
  android: true
  ios: false
  min_sdk_android: 24
  remove_alpha_ios: true
