name: 🐛 Bug 报告
description: 报告一个可复现的问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写完整，便于快速定位。
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？预期是什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - 桌面端 (Tauri/React)
        - 移动端 (Flutter)
        - 后端 (Spring Boot)
        - 其他
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: "如 0.1.0"
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 相关错误日志或截图（如有）
