name: ✨ 功能建议
description: 建议一个新功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决什么痛点？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么做？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 考虑过的其他方案
