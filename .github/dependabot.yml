# Dependabot —— 监控三端依赖更新
# 文档：https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # 后端：Maven (pom.xml)
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]

  # 桌面端：pnpm (package.json)
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "desktop"]

  # 移动端：Flutter/Dart (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "mobile"]

  # GitHub Actions 自身
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
